name: Build Moto G45 Kernel with KernelSU Next

on:
  workflow_dispatch: # Memungkinkan build manual dari tab Actions

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Mengosongkan Ruang Disk
      uses: jlumbroso/free-disk-space@v1.3.1
      with:
        tool-cache: true
        android: true
        dotnet: true
        haskell: true

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf lib32readline-dev lib32z1-dev liblz4-tool libncurses5-dev libsdl1.1-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev libtinfo5 representation-dev

    - name: Download Toolchain (AOSP Clang & GCC)
      run: |
        mkdir -p $GITHUB_WORKSPACE/toolchain
        cd $GITHUB_WORKSPACE/toolchain
        # Download Clang (Sesuaikan versi dengan kebutuhan kernel tree, biasanya Clang 12-17)
        wget https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-r487747c.tar.gz
        mkdir clang && tar -xf clang-r487747c.tar.gz -C clang
        # Download GCC AArch64 untuk GNU Assembler jika diperlukan
        git clone https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9 -b master --depth=1 gcc64
        git clone https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9 -b master --depth=1 gcc32

    - name: Clone Kernel Source
      run: |
        cd $GITHUB_WORKSPACE
        git clone https://github.com/Motorola-SM6375-Devs/android_kernel_motorola_sm6375.git -b sixteen --depth=1 kernel

    - name: Suntik KernelSU Next
      run: |
        cd $GITHUB_WORKSPACE/kernel
        # Mengintegrasikan KernelSU Next ke kernel tree
        curl -LSs "https://raw.githubusercontent.com/rifsxd/KernelSU-Next/main/kernel/setup.sh" | bash -s stable
        
        # Mengaktifkan konfigurasi KernelSU di defconfig secara otomatis
        echo "CONFIG_KSU=y" >> arch/arm64/configs/vendor/holi-qgki_defconfig
        echo "CONFIG_KSU_NEXT=y" >> arch/arm64/configs/vendor/holi-qgki_defconfig

    - name: Proses Kompilasi Kernel
      run: |
        cd $GITHUB_WORKSPACE/kernel
        export PATH="$GITHUB_WORKSPACE/toolchain/clang/bin:$GITHUB_WORKSPACE/toolchain/gcc64/bin:$GITHUB_WORKSPACE/toolchain/gcc32/bin:$PATH"
        
        # Variabel Lingkungan untuk Kompilasi
        export ARCH=arm64
        export SUBARCH=arm64
        export CROSS_COMPILE=aarch64-linux-android-
        export CROSS_COMPILE_ARM32=arm-linux-androideabi-
        export CC=clang
        export CLANG_TRIPLE=aarch64-linux-gnu-
        
        # Make defconfig & Build
        make O=out vendor/holi-qgki_defconfig
        make -j$(nproc --all) O=out

    - name: Packaging dengan AnyKernel3
      run: |
        cd $GITHUB_WORKSPACE
        # Clone AnyKernel3 template
        git clone https://github.com/osm0sis/AnyKernel3.git --depth=1 AnyKernel
        
        # Salin hasil kompilasi kernel (Image atau Image.gz tergantung defconfig)
        if [ -f kernel/out/arch/arm64/boot/Image.gz ]; then
          cp kernel/out/arch/arm64/boot/Image.gz AnyKernel/
        elif [ -f kernel/out/arch/arm64/boot/Image ]; then
          cp kernel/out/arch/arm64/boot/Image AnyKernel/
        fi
        
        # Konfigurasi ringkas AnyKernel3 untuk device kamu
        cd AnyKernel
        sed -i 's/do.devicecheck=1/do.devicecheck=0/g' anykernel.sh # Matikan device check jika untuk personal awal
        
        # Zip menjadi Flashable berkas
        zip -r9 ../MotoG45-KernelSU-Next.zip *

    - name: Upload Flashable Kernel
      uses: actions/upload-artifact@v4
      with:
        name: MotoG45-KernelSU-Next-Zip
        path: MotoG45-KernelSU-Next.zip
        
