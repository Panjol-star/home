name: Build Moto G45 Kernel

on:
  workflow_dispatch: # Memungkinkan Anda menjalankan build secara manual dari tab Actions

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          repository: 'LineageOS/android_kernel_motorola_sm6375'
          ref: 'lineage-23.2' # Sesuaikan dengan branch yang Anda gunakan
          path: kernel

      - name: Download Clang Toolchain
        run: |
          mkdir -p toolchain/clang
          cd toolchain/clang
          # Mengunduh skrip AntMan (Pengatur resmi Neutron Clang)
          curl -fSsL https://raw.githubusercontent.com/Neutron-Toolchains/antman/main/antman -o antman
          # Menjalankan sinkronisasi untuk mengunduh Neutron Clang versi terbaru
          bash antman --sync=latest
          echo "$(pwd)/bin" >> $GITHUB_PATH
          

      - name: Download Clang Toolchain
        run: |
          mkdir -p toolchain/clang
          cd toolchain/clang
          # Mengunduh skrip AntMan (Pengatur resmi Neutron Clang)
          curl -fSsL https://raw.githubusercontent.com/Neutron-Toolchains/antman/main/antman -o antman
          # Menjalankan sinkronisasi untuk mengunduh Neutron Clang versi terbaru
          bash antman --sync=latest
          echo "$(pwd)/bin" >> $GITHUB_PATH
               

      - name: Patch KernelSU Next
        run: |
          cd kernel
          # Mengunduh source KernelSU Next langsung ke folder drivers/kernelsu
          git clone --depth=1 https://github.com/rifsxd/KernelSU-Next drivers/kernelsu
          
          # Melakukan penambahan otomatis ke drivers/Makefile jika belum ada
          if ! grep -q "obj-y += kernelsu/" drivers/Makefile; then
            echo "obj-y += kernelsu/" >> drivers/Makefile
          fi

          # Menambahkan config ke defconfig target Anda
          echo "CONFIG_KSU=y" >> arch/arm64/configs/vendor/holi-qgki_defconfig
          echo "CONFIG_KSU_NEXT=y" >> arch/arm64/configs/vendor/holi-qgki_defconfig
          
          if [ -f arch/arm64/configs/vendor/ext_config/moto-holi.config ]; then
            echo "CONFIG_KSU=y" >> arch/arm64/configs/vendor/ext_config/moto-holi.config
            echo "CONFIG_KSU_NEXT=y" >> arch/arm64/configs/vendor/ext_config/moto-holi.config
          fi
          

      - name: Build Kernel
        run: |
          cd kernel
          export ARCH=arm64
          export SUBARCH=arm64
          
          # Gunakan cross-compiler yang disediakan di dalam folder bin Neutron Clang
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
          
          # 1. Jalankan defconfig
          make O=out LLVM=1 LLVM_IAS=1 CC=clang AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip vendor/holi-qgki_defconfig
          
          # 2. Proses kompilasi utama dengan detail log lebih jelas jika gagal
          make -j$(nproc --all) O=out LLVM=1 LLVM_IAS=1 CC=clang AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip || \
          make O=out LLVM=1 LLVM_IAS=1 CC=clang AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip
          
          
          

      - name: Upload Kernel Image
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-Moto-G45-KSU
          path: |
            kernel/out/arch/arm64/boot/Image
            kernel/out/arch/arm64/boot/dtb.img
            
